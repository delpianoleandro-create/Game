<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Juego Babylon</title>
  <style>
    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #joystick {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 140px;
      height: 140px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }
    #stick {
      position: absolute;
      left: 50px;
      top: 50px;
      width: 40px;
      height: 40px;
      background: rgba(0,255,255,0.5);
      border-radius: 50%;
    }
    .action-btn {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      color: white;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }
    #actionA {
      bottom: 50px;
      right: 130px;
      background: rgba(255, 0, 0, 0.5);
    }
    #actionB {
      bottom: 120px;
      right: 50px;
      background: rgba(0, 0, 255, 0.5);
    }
    #creditsBtn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px;
      background: rgba(255,255,255,0.3);
    }
    #creditsPanel {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 200px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="joystick"><div id="stick"></div></div>
  <div id="actionA" class="action-btn">A</div>
  <div id="actionB" class="action-btn">B</div>
  <button id="creditsBtn">Créditos</button>
  <div id="creditsPanel"></div>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script>
    const s = document.createElement('script');
    s.src = 'script.js?v=' + Date.now();
    document.body.appendChild(s);
  </script>
</body>
</html>
