<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- Forzar limpieza de caché -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>Aventuras y Mazmorras</title>
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Cargar Babylon primero -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  
  <style>
    #loading-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: #aaa;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 10000; font-family: monospace;
    }
    #loading-bar-container {
      width: 80%; height: 20px; border: 2px solid #555; border-radius: 10px; margin: 20px 0; overflow: hidden;
    }
    #loading-bar {
      width: 0%; height: 100%; background: #ffd700; transition: width 0.3s;
    }
    #log-console {
      width: 80%; height: 200px; background: #111; border: 1px solid #333;
      padding: 10px; overflow-y: auto; font-size: 12px; text-align: left;
    }
    .log-error { color: #ff5555; }
    .log-warn { color: #ffaa00; }
    .log-info { color: #88ff88; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h2 style="color:#fff;">CARGANDO MAZMORRA...</h2>
    <div id="loading-bar-container"><div id="loading-bar"></div></div>
    <div id="log-console"></div>
  </div>

  <canvas id="renderCanvas"></canvas>
  
  <!-- Punto de Mira (Crosshair) -->
  <div id="crosshair" style="display:none;">+</div>
  
  <!-- Capa Principal de Menús -->
  <div id="menu-layer">
    <!-- Menú Principal -->
    <div id="mainMenu" class="menu-panel">
      <h1 class="game-title">Las Profundidades de Elyria</h1>
      <button id="btnNewGame" class="menu-btn">Nueva Partida</button>
      <button id="btnSettingsMain" class="menu-btn">Configuración</button>
      <button id="btnCredits" class="menu-btn">Aventureros</button>
    </div>

    <!-- Menú de Configuración -->
    <div id="settingsMenu" class="menu-panel" style="display: none;">
      <h2 class="menu-title">Configuración</h2>
      
      <div class="settings-group">
        <h3>Controles y Cámara</h3>
        <label class="setting-item">
          <input type="radio" name="camMode" value="TOP_DOWN" checked>
          <span>Modo Clásico (Vista desde arriba, Mando puro)</span>
        </label>
        <label class="setting-item">
          <input type="radio" name="camMode" value="SHOOTER">
          <span>Modo Acción (Rotación táctil libre, Mando relativo)</span>
        </label>
      </div>

      <div class="settings-group">
        <h3>Gráficos</h3>
        <label class="setting-item">
          <input type="checkbox" id="chkShadows" checked>
          <span>Sombras Dinámicas (Desactivar si va lento)</span>
        </label>
      </div>

      <button id="btnSaveSettings" class="menu-btn">Guardar y Volver</button>
    </div>
  </div>

  <!-- Capa HUD (Oculta al inicio) -->
  <div id="ui-layer" style="display: none;">
    <div id="scoreDisplay">Oro: 0 | Nivel: 1</div>
    <button id="btnPause" class="pause-btn">⚙️</button>
    
    <!-- Inventario (Bolso) -->
    <div id="inventoryUI">
      <strong>🎒 Bolso:</strong> <span id="inventoryItems">Vacío</span>
    </div>
    
    <!-- Caja de Diálogos RPG -->
    <div id="dialogueBox" style="display: none;">
      <div id="dialogueName">Nombre</div>
      <div id="dialogueText">Texto de ejemplo para ver cómo queda...</div>
      <div id="dialoguePrompt">▼ Toca para continuar</div>
    </div>

    <div id="joystick"><div id="stick"></div></div>
    <div id="actionA" class="action-btn">🗡️</div>
    <div id="actionB" class="action-btn">🛡️</div>
  </div>

  <!-- Panel de Créditos (Ahora global) -->
  <div id="creditsPanel"></div>

  <!-- Cargamos el juego como módulo con un ID único para evadir la caché -->
  <script type="module">
    const logConsole = document.getElementById('log-console');
    const loadBar = document.getElementById('loading-bar');
    
    function appendLog(msg, type) {
      const p = document.createElement('div');
      p.className = 'log-' + type;
      p.textContent = `[${type.toUpperCase()}] ${msg}`;
      logConsole.appendChild(p);
      logConsole.scrollTop = logConsole.scrollHeight;
    }

    const originalLog = console.log;
    const originalWarn = console.warn;
    const originalError = console.error;

    console.log = function(...args) { originalLog(...args); appendLog(args.join(' '), 'info'); };
    console.warn = function(...args) { originalWarn(...args); appendLog(args.join(' '), 'warn'); };
    console.error = function(...args) { originalError(...args); appendLog(args.join(' '), 'error'); };

    console.log("Iniciando cargador de juego...");
    loadBar.style.width = "30%";
    
    // Simular carga de assets y scripts
    setTimeout(() => { loadBar.style.width = "60%"; }, 500);

    const timestamp = Date.now();
    import(`./src/game.js?v=${timestamp}`).then(() => {
        loadBar.style.width = "100%";
        console.log("Juego cargado correctamente. Iniciando...");
        setTimeout(() => {
            document.getElementById("loading-screen").style.display = "none";
        }, 800);
    }).catch(err => {
        console.error("Error Crítico al cargar módulo:", err.message);
        console.error(err.stack);
        loadBar.style.background = "red";
    });
  </script>
</body>
</html>
