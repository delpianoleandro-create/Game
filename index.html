<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Juego Crear</title>
  <style>
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#000; }
    #renderCanvas { width:100%; height:100%; touch-action:none; }
    #hud {
      position: absolute; top: 10px; left: 10px;
      background: rgba(20,20,20,0.8); color: #0f0;
      padding: 5px 10px; border-radius: 5px;
      font-family: monospace;
    }
    .joystick {
      position: absolute; bottom: 80px; left: 80px;
      width: 160px; height: 160px;
      background: rgba(50,50,50,0.5);
      border-radius: 50%; touch-action:none;
    }
    .stick {
      position: absolute; top: 60px; left: 60px;
      width: 40px; height: 40px;
      background: #0f0; border-radius: 50%;
    }
    .buttons {
      position: absolute; bottom: 80px; right: 80px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .btn {
      background: #111; color: #0f0;
      font-size: 22px; padding: 20px;
      border-radius: 50%; border: 2px solid #0f0;
      width: 80px; height: 80px;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div id="hud">⭐ Score: <span id="score">0</span></div>
<div class="joystick" id="joystick"><div class="stick" id="stick"></div></div>
<div class="buttons"><button class="btn" id="action">⚡</button></div>

<!-- Botón de créditos -->
<button id="creditsBtn" style="
  position:absolute; top:10px; right:10px;
  background:#111; color:#0f0; border:2px solid #0f0;
  padding:8px 12px; border-radius:5px; font-family:monospace;">
👥 Créditos
</button>

<div id="creditsPanel" style="
  display:none; position:absolute; top:50px; right:10px;
  width:320px; max-height:400px; overflow:auto;
  background:rgba(0,0,0,0.85); color:#0f0; padding:10px;
  border-radius:5px; font-family:monospace;">
</div>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

const createScene = () => {
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color3.Black();

  const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI/2, Math.PI/3, 25, BABYLON.Vector3.Zero(), scene);
  camera.attachControl(canvas, true);

  const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);
  light.intensity = 0.7;

  // Suelo oscuro
  const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:40, height:40}, scene);
  const matGround = new BABYLON.StandardMaterial("matGround", scene);
  matGround.diffuseColor = new BABYLON.Color3(0.1,0.1,0.1);
  ground.material = matGround;

  // Personaje placeholder
  const player = BABYLON.MeshBuilder.CreateBox("player", {size:2}, scene);
  player.position.y = 1;
  const matPlayer = new BABYLON.StandardMaterial("matPlayer", scene);
  matPlayer.diffuseColor = new BABYLON.Color3(0,1,0);
  player.material = matPlayer;

  let score = 0;
  const scoreDisplay = document.getElementById("score");
  // Joystick
  const joystick = document.getElementById("joystick");
  const stick = document.getElementById("stick");
  let centerX = joystick.offsetLeft + joystick.offsetWidth/2;
  let centerY = joystick.offsetTop + joystick.offsetHeight/2;
  let joyX = 0, joyY = 0;

  joystick.addEventListener("touchmove", e => {
    e.preventDefault();
    const touch = e.touches[0];
    let dx = touch.clientX - centerX;
    let dy = touch.clientY - centerY;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let maxDist = 70;
    if (dist > maxDist) { dx *= maxDist/dist; dy *= maxDist/dist; }
    stick.style.left = (dx + 60) + "px";
    stick.style.top = (dy + 60) + "px";
    joyX = dx/80;
    joyY = -dy/80;
  }, { passive:false });

  joystick.addEventListener("touchend", e => {
    e.preventDefault();
    stick.style.left = "60px"; stick.style.top = "60px";
    joyX = 0; joyY = 0;
  }, { passive:false });

  // Botón acción genérico
  document.getElementById("action").addEventListener("touchstart", e => {
    e.preventDefault();
    score++;
    scoreDisplay.textContent = score;
  }, { passive:false });

  // Botón de créditos
  const creditsBtn = document.getElementById("creditsBtn");
  const creditsPanel = document.getElementById("creditsPanel");

  creditsBtn.addEventListener("click", async () => {
    if (creditsPanel.style.display === "none") {
      try {
        const res = await fetch("comentarios.json");
        const data = await res.json();

        creditsPanel.innerHTML = "<h3>👥 Créditos</h3>";
        data.forEach(entry => {
          creditsPanel.innerHTML += `
            <p><strong>${entry.usuario}</strong>: ${entry.comentario}</p>
          `;
        });

        creditsPanel.style.display = "block";
      } catch (err) {
        creditsPanel.innerHTML = "<p>Error al cargar créditos</p>";
        creditsPanel.style.display = "block";
      }
    } else {
      creditsPanel.style.display = "none";
    }
  });

  // Loop
  scene.onBeforeRenderObservable.add(() => {
    player.position.x += joyX * 0.1;
    player.position.z += joyY * 0.1;
    player.position.y = 1;
  });

  return scene;
};

const scene = createScene();
engine.runRenderLoop(() => scene.render());
window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
