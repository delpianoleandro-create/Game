<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mundo Abierto 3D</title>
  <style>html, body {width:100%;height:100%;margin:0;overflow:hidden;}</style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<script>
  const canvas = document.getElementById("renderCanvas");
  const engine = new BABYLON.Engine(canvas, true);

  const createScene = () => {
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color3(0.5, 0.8, 1);

    // Cámara en tercera persona
    const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI/2, Math.PI/3, 20, BABYLON.Vector3.Zero(), scene);
    camera.attachControl(canvas, true);

    // Luz
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

    // Terreno
    const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:50, height:50}, scene);

    // Personaje jugador
    const player = BABYLON.MeshBuilder.CreateBox("player", {size:2}, scene);
    player.position.y = 1;
    player.material = new BABYLON.StandardMaterial("pmat", scene);
    player.material.diffuseColor = new BABYLON.Color3(0,0,1);

    // NPC
    const npc = BABYLON.MeshBuilder.CreateBox("npc", {size:2}, scene);
    npc.position.set(5,1,5);
    npc.material = new BABYLON.StandardMaterial("nmat", scene);
    npc.material.diffuseColor = new BABYLON.Color3(1,0,0);

    // Controles táctiles
    let moveDir = 0;
    window.addEventListener("touchstart", e => {
      if (e.touches[0].clientX < window.innerWidth/2) moveDir = -0.2;
      else moveDir = 0.2;
    });
    window.addEventListener("touchend", () => moveDir = 0);

    scene.onBeforeRenderObservable.add(() => {
      player.position.x += moveDir;
      camera.target = player.position; // cámara sigue al jugador
    });

    return scene;
  };

  const scene = createScene();
  engine.runRenderLoop(() => scene.render());
  window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
